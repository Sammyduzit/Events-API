name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker Image
              run: |
                docker build -t events-api:latest .

            - name: Run Container
              run: |
                docker run -d -p 5001:5001 --name events-api-container events-api:latest
                  for i in {1..20}; do
                    if curl -fsS http://localhost:5001/api/health; then
                        echo "Health check PASSED"
                        exit 0
                    fi
                    echo "Waiting for API... ($i)"
                    sleep 1
                  done

                  echo "Health check FAILED"
                  docker logs events-api-container || true
                  exit 1
            
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"
            
            - name: Install Dependencies
              run: |
                pip install -r requirements-test.txt

            - name: Run Tests against Container
              run: |
                pytest -v

            - name: Stop Container
              if: always()
              run: |
                docker stop events-api-container || true

            - name: Remove Container
              if: always()
              run: |
                docker rm events-api-container || true

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: ${{secrets.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

            - name: Tag Docker Image
              run: |
                docker tag events-api:latest ${{secrets.DOCKERHUB_USERNAME}}/events-api:latest

            - name: Push to DockerHub
              run: |
                docker push ${{secrets.DOCKERHUB_USERNAME}}/events-api:latest

            - name: Trigger Render redeploy
              run: |
                curl -X POST ${{secrets.RENDER_DEPLOY_HOOK}}
              








